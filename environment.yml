name: nanovllm
channels:
  - conda-forge
  - nvidia
  - defaults
dependencies:
  - python=3.10
  - jupyter
  - ipykernel

  - gcc_linux-64=12
  - gxx_linux-64=12

  # Pin CUDA toolkit to match PyTorch's CUDA version
  - conda-forge::cuda-version=12.1
  - nvidia::cuda-toolkit=12.1.1
  - nvidia::cuda-nvcc=12.1.105
  - nvidia::cuda-cudart=12.1.105

  # Build tools for custom CUDA extensions
  - ninja
  - packaging
  - setuptools
  - wheel

  # Core dependencies
  - numpy
  - safetensors

  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121

      # Pin PyTorch ecosystem to prevent dependency drift
      - torch==2.5.1
      - torchvision==0.20.1
      - torchaudio==2.5.1

      # LLM ecosystem
      - transformers
      - huggingface_hub

      # Utilities
      - triton
      - pytest
      - matplotlib
